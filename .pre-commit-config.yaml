repos:
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.0.7
    hooks:
      - id: sqlfluff-lint
        args: ["--dialect", "ansi"]
        files: ^dbt/models/|^dbt/macros/|^dbt/tests/|^dbt/analyses/
      - id: sqlfluff-fix
        args: ["--dialect", "ansi"]
        files: ^dbt/models/|^dbt/macros/|^dbt/tests/|^dbt/analyses/
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yml"]
