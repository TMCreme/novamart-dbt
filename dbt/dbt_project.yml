name: novamart
version: "1.0.0"
config-version: 2
profile: novamart

vars:
  novamart:
    payment_methods: ["credit_card", "paypal", "gift_card", "bank_transfer"]
    lookback_window_hours: 72

models:
  novamart:
    staging:
      +materialized: view
      +tags: ["staging", "daily"]
      +schema: staging
    intermediate:
      +materialized: ephemeral
      +tags: ["intermediate", "daily"]
      +schema: intermediate
    marts:
      core:
        +materialized: table
        +tags: ["core", "daily"]
        +schema: marts_core
      finance:
        +materialized: table
        +tags: ["finance", "daily"]
        +schema: marts_finance
      marketing:
        +materialized: table
        +tags: ["marketing", "daily"]
        +schema: marts_marketing

snapshots:
  novamart:
    +tags: ["snapshot"]
    +target_schema: snapshots

seeds:
  novamart:
    +tags: ["seed"]
    app_db:
      +schema: raw_app_db
    shopify:
      +schema: raw_shopify
    stripe:
      +schema: raw_stripe
    web_analytics:
      +schema: raw_web_analytics

on-run-end:
  - "{{ log_run_metadata() }}"

dispatch:
  - macro_namespace: novamart
    search_order: ['novamart', 'dbt_utils', 'dbt']
