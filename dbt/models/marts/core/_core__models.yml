version: 2

models:
  - name: dim_customers
    description: "Customer dimension with address and lifetime order metrics"
    meta:
      owner: "analytics-team"
      contains_pii: true
    columns:
      - name: customer_key
        description: "Surrogate key (MD5 hash of user_id)"
        tests:
          - unique
          - not_null
      - name: user_id
        description: "Natural key from source"
        tests:
          - unique
          - not_null
      - name: full_name
        meta:
          pii: true
        tests:
          - not_null
      - name: tier
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["gold", "silver", "bronze"]
      - name: lifetime_order_count
        tests:
          - not_negative
      - name: lifetime_spend_dollars
        tests:
          - not_negative

  - name: dim_products
    description: "Product dimension with inventory stock status"
    columns:
      - name: product_key
        description: "Surrogate key (MD5 hash of product_id)"
        tests:
          - unique
          - not_null
      - name: product_id
        description: "Natural key from source"
        tests:
          - unique
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: category
        tests:
          - not_null
      - name: price_dollars
        tests:
          - not_null
      - name: stock_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["in_stock", "low_stock", "out_of_stock"]
      - name: total_stock_quantity
        tests:
          - not_negative

  - name: dim_dates
    description: "Date dimension generated via date spine macro"
    columns:
      - name: date_day
        description: "Primary key — calendar date"
        tests:
          - unique
          - not_null
      - name: year
        tests:
          - not_null
      - name: month
        tests:
          - not_null
      - name: day_of_month
        tests:
          - not_null

  - name: fct_orders
    description: "Order fact table — incremental with 72h lookback window"
    meta:
      owner: "analytics-team"
      critical: true
    columns:
      - name: order_id
        description: "Primary key — one row per order"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_total_dollars
        tests:
          - not_null
          - not_negative
      - name: payment_amount_dollars
        tests:
          - not_negative

  - name: fct_payments
    description: "Payment fact table — incremental append-only"
    columns:
      - name: payment_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: amount_dollars
        tests:
          - not_null
          - not_negative
      - name: currency
        tests:
          - not_null
          - valid_currency_code
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["succeeded", "pending", "failed", "refunded"]
