version: 2

sources:
  - name: app_db
    description: "NovaMart application database — user accounts, product catalog, and inventory"
    schema: raw_app_db
    freshness:
      warn_after:
        count: 12
        period: hour
      error_after:
        count: 24
        period: hour
    loaded_at_field: _etl_loaded_at
    tables:
      - name: users
        identifier: users_initial
        description: "User accounts with tier membership"
        columns:
          - name: user_id
            description: "Primary key"
          - name: email
            description: "User email address"
          - name: name
            description: "Full name"
          - name: tier
            description: "Membership tier: gold, silver, bronze"
          - name: is_deleted
            description: "Soft delete flag"

      - name: products
        identifier: products_initial
        description: "Product catalog with pricing"
        columns:
          - name: product_id
            description: "Primary key"
          - name: name
            description: "Product name"
          - name: category
            description: "Product category"
          - name: price_cents
            description: "Price in cents"
          - name: is_deleted
            description: "Soft delete flag"

      - name: inventory
        identifier: inventory_initial
        description: "Current inventory levels per product per warehouse"
        columns:
          - name: inventory_id
            description: "Primary key"
          - name: product_id
            description: "Foreign key to products"
          - name: warehouse_location
            description: "Warehouse identifier"
          - name: quantity
            description: "Current stock quantity"

      - name: addresses
        identifier: addresses_initial
        description: "User shipping and billing addresses"
        columns:
          - name: address_id
            description: "Primary key"
          - name: user_id
            description: "Foreign key to users"
