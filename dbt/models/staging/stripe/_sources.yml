version: 2

sources:
  - name: stripe
    description: "Stripe payment processing — event-sourced, immutable append"
    schema: "{{ target.schema }}"
    freshness:
      warn_after:
        count: 6
        period: hour
      error_after:
        count: 12
        period: hour
    loaded_at_field: _etl_loaded_at
    tables:
      - name: payments
        identifier: payments_initial
        description: "Payment transactions linked to orders"
        columns:
          - name: payment_id
            description: "Primary key"
          - name: order_id
            description: "Foreign key to shopify.orders"

      - name: charges
        identifier: charges_initial
        description: "Charge records linked to payments"
        columns:
          - name: charge_id
            description: "Primary key"
          - name: payment_id
            description: "Foreign key to payments"

      - name: refunds
        identifier: stripe_refunds_initial
        description: "Stripe-side refund records linked to charges"
        columns:
          - name: refund_id
            description: "Primary key"
          - name: charge_id
            description: "Foreign key to charges"

      - name: disputes
        identifier: disputes_initial
        description: "Payment disputes and chargebacks"
        columns:
          - name: dispute_id
            description: "Primary key"
          - name: charge_id
            description: "Foreign key to charges"
