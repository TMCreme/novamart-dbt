version: 2

sources:
  - name: shopify
    description: "Shopify-like order management system"
    schema: "{{ target.schema }}"
    freshness:
      warn_after:
        count: 6
        period: hour
      error_after:
        count: 12
        period: hour
    loaded_at_field: _etl_loaded_at
    tables:
      - name: orders
        identifier: orders_initial
        description: "Customer orders"
        columns:
          - name: order_id
            description: "Primary key"
          - name: customer_id
            description: "Foreign key to app_db.users"
          - name: status
            description: "Order status: completed, pending, cancelled, returned"

      - name: order_items
        identifier: order_items_initial
        description: "Line items within orders"
        columns:
          - name: order_item_id
            description: "Primary key"
          - name: order_id
            description: "Foreign key to orders"
          - name: product_id
            description: "Foreign key to app_db.products"

      - name: refunds
        identifier: shopify_refunds_initial
        description: "Order refunds"
        columns:
          - name: refund_id
            description: "Primary key"
          - name: order_id
            description: "Foreign key to orders"
