name: dbt CI
on:
  pull_request:
    branches: [develop, main]

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-duckdb sqlfluff sqlfluff-templater-dbt
      - run: dbt deps
      - run: sqlfluff lint models/
      - run: dbt parse
      - run: dbt compile --target dev
